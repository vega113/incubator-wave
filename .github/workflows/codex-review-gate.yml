name: Codex Review Gate

on:
  pull_request:
    branches: [ main ]
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  issue_comment:
    types:
      - created
      - edited

jobs:
  codex-review-gate:
    name: Codex Review Gate
    if: >-
      ${{
        (github.event.pull_request != null || github.event.issue.pull_request != null) &&
        (
          github.event_name != 'issue_comment' ||
          (
            github.event.comment.user.login == github.repository_owner &&
            contains(github.event.comment.body, '/codex-review-gate')
          )
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Evaluate review gate
        uses: actions/github-script@v7
        with:
          script: |
            const { evaluateCodexReviewGate } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/codex-review-gate`);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber =
              context.payload.pull_request?.number ??
              context.payload.issue?.number ??
              context.payload.review_thread?.pull_request?.number;

            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  defaultBranchRef {
                    name
                  }
                  pullRequest(number: $number) {
                    isDraft
                    baseRefName
                    headRefOid
                    labels(first: 100) {
                      nodes { name }
                    }
                    commits(last: 1) {
                      nodes {
                        commit {
                          oid
                          committedDate
                          statusCheckRollup {
                            contexts(first: 100) {
                              nodes {
                                __typename
                                ... on StatusContext {
                                  context
                                  state
                                }
                                ... on CheckRun {
                                  name
                                  conclusion
                                  status
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                    reviews(last: 100) {
                      nodes {
                        author {
                          login
                        }
                        body
                        commit {
                          oid
                        }
                        state
                      }
                    }
                    comments(last: 100) {
                      nodes {
                        author {
                          login
                        }
                        body
                      }
                    }
                    reviewThreads(last: 100) {
                      nodes {
                        isResolved
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, { owner, repo, number: prNumber });
            const pullRequest = result.repository.pullRequest;
            if (!pullRequest) {
              core.setFailed(`Pull request #${prNumber} not found`);
              return;
            }

            const evaluation = evaluateCodexReviewGate({
              pullRequest,
              defaultBranchName: result.repository.defaultBranchRef?.name ?? "main",
            });

            if (!evaluation.ok) {
              core.setFailed(evaluation.message);
              return;
            }

            core.info(evaluation.message);
